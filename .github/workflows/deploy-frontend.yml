name: Deploy frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > cloud-task-vpc.pem
          chmod 600 cloud-task-vpc.pem

      - name: Copy frontend files to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i cloud-task-vpc.pem -r frontend/dist/* ubuntu@18.185.38.101:/var/www/frontend/

      - name: Restart nginx
        run: |
          ssh -o StrictHostKeyChecking=no -i cloud-task-vpc.pem ubuntu@18.185.38.101 "sudo systemctl restart nginx"